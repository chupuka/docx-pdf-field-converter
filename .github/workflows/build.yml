name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install LibreOffice (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Build with PyInstaller
        run: |
          pyinstaller app.spec --clean

      - name: Prepare Windows artifact
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p release
          cp dist/DocxToPdfConverter.exe release/DocxToPdfConverter.exe
          ls -la release/

      - name: Prepare macOS artifact
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p release
          cp -r dist/app release/DocxToPdfConverter.app
          chmod +x release/DocxToPdfConverter.app/Contents/MacOS/*
          ls -la release/

      - name: Prepare Linux artifact
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p release
          cp -r dist/app release/DocxToPdfConverter
          chmod +x release/DocxToPdfConverter
          ls -la release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}