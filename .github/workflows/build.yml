name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install LibreOffice (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Build with PyInstaller
        run: |
          pyinstaller app.spec --clean

      - name: Debug dist contents
        shell: bash
        run: |
          echo "=== Contents of dist/ ==="
          ls -la dist/
          echo "=== Contents of dist subdirectories ==="
          find dist/ -type f -name "DocxToPdfConverter*" 2>/dev/null || true
          find dist/ -type f 2>/dev/null | head -20 || true

      - name: Prepare Windows artifact
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p release
          EXE_FILE=$(find dist/ -name "*.exe" -type f 2>/dev/null | head -1)
          if [ -n "$EXE_FILE" ]; then
            cp "$EXE_FILE" release/DocxToPdfConverter.exe
          else
            cp dist/DocxToPdfConverter.exe release/ 2>/dev/null || echo "No exe found"
          fi

      - name: Prepare macOS artifact
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p release
          if [ -d "dist/app" ]; then
            cp -r dist/app release/DocxToPdfConverter.app
          elif [ -f "dist/DocxToPdfConverter" ]; then
            mkdir -p release/DocxToPdfConverter.app/Contents/MacOS
            cp dist/DocxToPdfConverter release/DocxToPdfConverter.app/Contents/MacOS/
          fi

      - name: Prepare Linux artifact
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p release
          if [ -d "dist/app" ]; then
            cp -r dist/app release/DocxToPdfConverter
            chmod +x release/DocxToPdfConverter
          elif [ -f "dist/DocxToPdfConverter" ]; then
            cp dist/DocxToPdfConverter release/
            chmod +x release/DocxToPdfConverter
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}